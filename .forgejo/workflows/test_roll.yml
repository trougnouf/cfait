name: Test and Rolling Release

on:
  push:
    branches:
      - "master"
      - "**"
    tags-ignore:
      - "**"
  pull_request:

jobs:
  # --- JOB 1: TESTS ---
  test:
    runs-on: self-hosted-arch
    container:
      image: local/arch-builder
      volumes:
        - cargo-registry:/usr/local/cargo/registry
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unit tests
        run: cargo test --all-features --verbose

      - name: Run linter (clippy)
        run: cargo clippy --all-features -- -D warnings

  # --- JOB 2: ROLLING ANDROID ---
  rolling-android:
    needs: test
    if: github.event_name == 'push'
    runs-on: self-hosted-ubuntu
    container:
      image: local/ubuntu-builder
      volumes:
        - cargo-registry:/usr/local/cargo/registry
        - gradle-cache:/root/.gradle
      env:
        RUSTFLAGS: "--remap-path-prefix ${{ github.workspace }}=/c --remap-path-prefix /usr/local/cargo=/cargo -C link-arg=-Wl,--build-id=none"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Keystore
        run: echo "${{ secrets.ANDROID_SIGNING_KEYSTORE_B64 }}" | base64 --decode > cfait-rolling.keystore

      - name: Build Rust JNI Libs
        run: |
          cargo ndk \
            -t aarch64-linux-android \
            -t armv7-linux-androideabi \
            -t x86_64-linux-android \
            -o ./android/app/src/main/jniLibs \
            --platform 28 \
            build --release --lib --features mobile

      - name: Build Signed Android APK
        env:
          KEYSTORE_FILE: "${{ github.workspace }}/cfait-rolling.keystore"
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare Artifact
        run: |
          mkdir -p dist-android
          cp android/app/build/outputs/apk/release/*.apk dist-android/cfait-android-rolling.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v3
        with:
          name: rolling-android
          path: dist-android/*
          retention-days: 1

  # --- JOB 3: ROLLING WINDOWS ---
  rolling-windows:
    needs: test
    if: github.event_name == 'push'
    runs-on: self-hosted-arch
    container:
      image: local/arch-builder
      volumes:
        - cargo-registry:/usr/local/cargo/registry
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows Binaries
        run: |
          rustup target add x86_64-pc-windows-gnu
          cargo build --release --target x86_64-pc-windows-gnu --features gui

      - name: Create Windows Archive
        run: |
          mkdir -p windows-staging
          cp target/x86_64-pc-windows-gnu/release/cfait.exe windows-staging/
          cp target/x86_64-pc-windows-gnu/release/cfait-gui.exe windows-staging/cfait-gui.exe
          cp README.md LICENSE windows-staging/
          mkdir -p dist-windows
          (cd windows-staging && zip -r "../dist-windows/cfait-windows-rolling.zip" .)

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: rolling-windows
          path: dist-windows/*
          retention-days: 1

  # --- JOB 4: ROLLING FLATPAK ---
  rolling-flatpak:
    needs: test
    if: github.event_name == 'push'
    runs-on: self-hosted-arch
    container:
      image: local/arch-builder
      options: --security-opt seccomp=unconfined --security-opt apparmor=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate cargo-sources.yml
        run: |
          wget https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 flatpak-cargo-generator.py Cargo.lock -o cargo-sources.yml

      - name: Prepare Manifest for Rolling
        run: |
          python3 -c "
          import yaml
          with open('com.trougnouf.Cfait.yml', 'r') as f:
              data = yaml.safe_load(f)
          # Replace the first source (the git repo) with a local directory reference
          data['modules'][0]['sources'][0] = {'type': 'dir', 'path': '.'}
          with open('com.trougnouf.Cfait.yml', 'w') as f:
              yaml.dump(data, f)
          "

      - name: Build Flatpak Bundle
        run: |
          # Ensure builder user owns the workspace for Flatpak-builder
          chown -R builder:builder .
          su builder -c "flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo"
          su builder -c "flatpak-builder --user --disable-rofiles-fuse --install-deps-from=flathub --force-clean --repo=repo build-dir com.trougnouf.Cfait.yml"
          su builder -c "flatpak build-bundle repo cfait-rolling.flatpak com.trougnouf.Cfait"

      - name: Prepare Artifact
        run: |
          mkdir -p dist-flatpak
          mv cfait-rolling.flatpak dist-flatpak/

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v3
        with:
          name: rolling-flatpak
          path: dist-flatpak/*
          retention-days: 1

  # --- JOB 5: PUBLISH ROLLING RELEASE ---
  publish-rolling:
    needs: [rolling-android, rolling-windows, rolling-flatpak]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: self-hosted-ubuntu
    container:
      image: local/ubuntu-builder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: Update Rolling Release on Codeberg
        env:
          TEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          tea login add --name codeberg --url ${{ github.server_url }} --token ${{ secrets.RELEASE_TOKEN }}
          REPO="${{ github.repository }}"
          TAG_NAME="rolling"

          git config --global user.name "Cfait Release Bot"
          git config --global user.email "bot@trougnouf.com"
          git tag -f "$TAG_NAME"
          git push origin "$TAG_NAME" -f
          sleep 3

          tea release delete --repo "$REPO" --confirm "$TAG_NAME" 2>/dev/null || true
          tea release create \
            --repo "$REPO" \
            --title "Rolling Development Build" \
            --note "Automated development build (Commit: ${{ github.sha }})." \
            --prerelease \
            "$TAG_NAME"

          echo "Uploading assets..."
          find dist -type f -exec echo "Uploading {}..." \; -exec tea release assets create --repo "$REPO" "$TAG_NAME" {} \;
