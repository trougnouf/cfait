name: Test and Rolling Release

on:
  push:
    branches:
      - "master"
      - "**"
    tags:
      - "**"
  pull_request:

jobs:
  # --- JOB 1: VALIDATION ---
  test:
    runs-on: self-hosted-arch
    container:
      image: local/arch-builder
      volumes:
        - cargo-registry:/usr/local/cargo/registry
      env:
        RUSTFLAGS: "-C debuginfo=0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check formatting (rustfmt)
        run: cargo fmt --all -- --check

      - name: Run linter (clippy)
        run: cargo clippy --all-features --all-targets --locked -- -D warnings

      - name: Run unit tests
        run: cargo test --all-features --all-targets --locked --verbose

  # --- JOB 2: ROLLING ANDROID (Only on PUSH) ---
  rolling-android:
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    runs-on: self-hosted-ubuntu
    container:
      image: local/ubuntu-builder
      volumes:
        - cargo-registry:/usr/local/cargo/registry
        - gradle-cache:/root/.gradle
      env:
        RUSTFLAGS: "--remap-path-prefix ${{ github.workspace }}=/c --remap-path-prefix /usr/local/cargo=/cargo -C link-arg=-Wl,--build-id=none"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Keystore
        run: |
          if [ -n "${{ secrets.ANDROID_SIGNING_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.ANDROID_SIGNING_KEYSTORE_B64 }}" | base64 --decode > cfait-rolling.keystore
          else
            echo "Secrets not available (fork PR). Generating a temporary dummy keystore for the release build."
            keytool -genkey -v \
              -keystore cfait-rolling.keystore \
              -alias cfait-rolling \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass dummypassword \
              -keypass dummypassword \
              -dname "CN=Cfait, OU=Cfait, O=Cfait, C=BE"
          fi

      - name: Build Rust JNI Libs
        run: |
          cargo ndk \
            -t aarch64-linux-android \
            -t armv7-linux-androideabi \
            -t x86_64-linux-android \
            -o ./android/app/src/main/jniLibs \
            --platform 28 \
            build --release --lib --features mobile --locked

      - name: Build Signed Android APK
        env:
          KEYSTORE_FILE: "${{ github.workspace }}/cfait-rolling.keystore"
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'dummypassword' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'cfait-rolling' }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'dummypassword' }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare Artifact
        run: |
          mkdir -p dist-android
          cp android/app/build/outputs/apk/release/*.apk dist-android/cfait-android-rolling.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v3
        with:
          name: rolling-android
          path: dist-android/*
          retention-days: 1

  # --- JOB 4: ROLLING FLATPAK ---
  rolling-flatpak:
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    runs-on: self-hosted-arch
    container:
      image: local/arch-builder
      options: --privileged
      volumes:
        - cargo-registry:/usr/local/cargo/registry
        - flatpak-builder-cache:/flatpak-cache
        - flatpak-user-dir:/home/builder/.local/share/flatpak
      env:
        RUSTFLAGS: "-C debuginfo=0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate cargo-sources.yml
        run: |
          mkdir -p /flatpak-cache
          if [ ! -f /flatpak-cache/flatpak-cargo-generator.py ]; then
            wget https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py -O /flatpak-cache/flatpak-cargo-generator.py
          fi
          python3 /flatpak-cache/flatpak-cargo-generator.py Cargo.lock -o cargo-sources.yml

      - name: Prepare Manifest for Rolling
        run: |
          python3 -c "
          import yaml
          with open('com.trougnouf.Cfait.yml', 'r') as f:
              data = yaml.safe_load(f)
          # Replace the first source (the git repo) with a local directory reference
          data['modules'][0]['sources'][0] = {'type': 'dir', 'path': '.'}
          with open('com.trougnouf.Cfait.yml', 'w') as f:
              yaml.dump(data, f)
          "

      - name: Build Flatpak Bundle
        run: |
          mkdir -p /flatpak-cache /home/builder/.local/share/flatpak
          chown -R builder:builder . /flatpak-cache /home/builder/.local/share/flatpak
          su builder -c "flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo"
          su builder -c "flatpak-builder --user --disable-rofiles-fuse --install-deps-from=flathub --force-clean --state-dir=/flatpak-cache --repo=repo build-dir com.trougnouf.Cfait.yml"
          su builder -c "flatpak build-bundle repo cfait-rolling.flatpak com.trougnouf.Cfait"

      - name: Prepare Artifact
        run: |
          mkdir -p dist-flatpak
          mv cfait-rolling.flatpak dist-flatpak/

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v3
        with:
          name: rolling-flatpak
          path: dist-flatpak/*
          retention-days: 1

  # --- JOB 3: ROLLING WINDOWS (Only on PUSH) ---
  rolling-windows:
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    runs-on: self-hosted-arch
    container:
      image: local/arch-builder
      volumes:
        - cargo-registry:/usr/local/cargo/registry
      env:
        RUSTFLAGS: "-C debuginfo=0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows Binaries
        run: |
          cargo build --release --target x86_64-pc-windows-gnu --features gui --locked

      - name: Create Windows Archive
        run: |
          mkdir -p windows-staging
          cp target/x86_64-pc-windows-gnu/release/cfait.exe windows-staging/
          cp target/x86_64-pc-windows-gnu/release/cfait-gui.exe windows-staging/cfait-gui.exe
          cp README.md LICENSE windows-staging/
          mkdir -p dist-windows
          (cd windows-staging && zip -r "../dist-windows/cfait-windows-rolling.zip" .)

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: rolling-windows
          path: dist-windows/*
          retention-days: 1

  # --- JOB 5: PUBLISH ROLLING RELEASE ---
  publish-rolling:
    needs: [rolling-android, rolling-windows, rolling-flatpak]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: self-hosted-ubuntu
    container:
      image: local/ubuntu-builder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: Update Rolling Release on Codeberg
        env:
          TEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          tea login add --name codeberg --url ${{ github.server_url }} --token ${{ secrets.RELEASE_TOKEN }}
          REPO="${{ github.repository }}"
          TAG_NAME="rolling"

          # 1. Tag the release
          git config --global user.name "Cfait Release Bot"
          git config --global user.email "bot@trougnouf.com"
          git tag -f "$TAG_NAME"
          git push origin "$TAG_NAME" -f
          sleep 5

          # 2. Delete old release if it exists
          tea release delete --repo "$REPO" --confirm "$TAG_NAME" 2>/dev/null || true

          # 3. Flatten the directory structure
          # Moves files from subfolders (like dist/rolling-android/cfait.apk) to dist/
          cd dist
          find . -mindepth 2 -type f -exec mv -t . {} +

          # 4. Build the asset arguments array
          ASSETS=()
          for file in *; do
            if [ -f "$file" ]; then
              ASSETS+=("--asset" "$file")
              echo "Queued for upload: $file"
            fi
          done

          # 5. Re-create the release with ALL assets attached in one command
          tea release create \
            --repo "$REPO" \
            --title "Rolling Development Build" \
            --note "Automated development build (Commit: ${{ github.sha }})." \
            --prerelease \
            "${ASSETS[@]}" \
            "$TAG_NAME"

          echo "✅ Rolling release updated successfully with all assets!"
